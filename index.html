<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkyFetch - Weather Dashboard</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">

    <!-- 🌤️ HEADER -->
    <h1>🌤️ SkyFetch</h1>
    <p class="tagline">Your Personal Weather Dashboard</p>

    <!-- 🔍 SEARCH SECTION (Part 2) -->
    <div class="search-section">
      <input 
        type="text" 
        id="city-input" 
        placeholder="Enter city name..."
      >
      <button id="search-btn">Search</button>
    </div>

    <!-- 💾 RECENT SEARCHES (Part 4) -->
    <div id="recent-searches-section" class="recent-searches-section" style="display: none;">
      <h4>Recent Searches</h4>
      <div id="recent-searches-container"></div>
    </div>

    <!-- 🌦️ WEATHER DISPLAY (Part 1 + 3) -->
    <div id="weather-display">
      <p>🌍 Enter a city to get weather</p>
    </div>

  </div>

  <!-- Axios CDN -->
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <!-- JS FILE -->
  <script src="app.js"></script>

</body>
</html>
